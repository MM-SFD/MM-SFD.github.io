<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MM-SFD: Welcome</title>
  <link rel="icon" href="./static/images/mmsfd_favicon.png">
  <link href="https://fonts.googleapis.com/css?family=Google+Sans|Noto+Sans|Castoro" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    @font-face {
      font-family: 'CustomFont';
      src: url('./static/NanumBrushScript-Regular.ttf') format('truetype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: #111;
      cursor: pointer;
    }

    /* ── Background: slow vertical scroll ── */
    .bg-scroll {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 300vh;
      background-image: url('短剧续播_bg.png');
      background-size: cover;
      background-position: center top;
      z-index: 0;
      will-change: transform;
    }

    /* ── Dark cinematic overlay ── */
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(
        180deg,
        rgba(20,24,30,0.75) 0%,
        rgba(20,24,30,0.50) 40%,
        rgba(20,24,30,0.50) 60%,
        rgba(20,24,30,0.80) 100%
      );
      z-index: 1;
    }

    /* ── Film grain scanlines ── */
    .grain {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 1px,
        rgba(0,0,0,0.04) 1px,
        rgba(0,0,0,0.04) 2px
      );
    }

    /* ── Letterbox cinematic bars ── */
    .letterbox-top, .letterbox-bottom {
      position: fixed;
      left: 0;
      width: 100%;
      height: 8vh;
      background: #111;
      z-index: 6;
    }
    .letterbox-top { top: 0; }
    .letterbox-bottom { bottom: 0; }

    /* ── Center content ── */
    .center-stage {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 3;
    }

    /* ── Title ── */
    .logo {
      font-family: 'CustomFont', 'Google Sans', sans-serif;
      font-size: 16vw;
      font-weight: bold;
      letter-spacing: 0.03em;
      line-height: 1;
      text-shadow:
        0 0 80px rgba(196, 154, 108, 0.25),
        0 4px 30px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    .logo .mm  { color: #e8e0d6; display: inline-block; opacity: 0; }
    .logo .dash { color: #6a7a8a; display: inline-block; opacity: 0; }
    .logo .sfd  { color: #c49a6c; display: inline-block; opacity: 0; }

    /* ── Decorative line ── */
    .line-reveal {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c49a6c, transparent);
      margin: 2.5vh 0;
    }

    /* ── Subtitle ── */
    .subtitle-line {
      font-family: 'Google Sans', sans-serif;
      font-size: 2vw;
      color: rgba(255,255,255,0.7);
      text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
      opacity: 0;
      letter-spacing: 0.04em;
    }
    .subtitle-line.small {
      font-size: 1.5vw;
      color: rgba(255,255,255,0.45);
      margin-top: 0.8vh;
    }

    /* ── Badge ── */
    .conference-badge {
      margin-top: 3.5vh;
      padding: 8px 32px;
      border: 1px solid rgba(196, 154, 108, 0.35);
      border-radius: 30px;
      color: #c49a6c;
      font-family: 'Google Sans', sans-serif;
      font-size: 1vw;
      font-weight: 600;
      letter-spacing: 0.2em;
      background: rgba(196, 154, 108, 0.06);
      opacity: 0;
    }

    /* ── Click prompt ── */
    .please-click {
      position: fixed;
      bottom: 11vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 7;
      opacity: 0;
    }
    .please-click span {
      font-family: 'Google Sans', sans-serif;
      font-size: 0.9em;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }
    .arrow-down {
      margin-top: 10px;
      font-size: 1.6em;
      color: rgba(196, 154, 108, 0.6);
      animation: float 2s ease-in-out infinite;
    }

    /* ── Vignette ── */
    .vignette {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 4;
      background: radial-gradient(
        ellipse at center,
        transparent 50%,
        rgba(10,12,16,0.6) 100%
      );
    }
  </style>
</head>
<body>

  <script>
    document.addEventListener('click', function() {
      // Cinematic fade-out before navigating
      gsap.to('.center-stage, .please-click', {
        opacity: 0, duration: 0.4, ease: "power2.in"
      });
      gsap.to('.letterbox-top', {
        height: '50vh', duration: 0.8, ease: "power2.inOut"
      });
      gsap.to('.letterbox-bottom', {
        height: '50vh', duration: 0.8, ease: "power2.inOut",
        onComplete: function() {
          window.location.href = 'home_page.html';
        }
      });
    });
  </script>

  <!-- Background image with vertical scroll -->
  <div class="bg-scroll"></div>

  <!-- Dark overlay -->
  <div class="overlay"></div>

  <!-- Vignette -->
  <div class="vignette"></div>

  <!-- Film grain -->
  <div class="grain"></div>

  <!-- Letterbox bars -->
  <div class="letterbox-top"></div>
  <div class="letterbox-bottom"></div>

  <!-- Main content -->
  <div class="center-stage">
    <div class="logo">
      <span class="mm">MM</span><span class="dash">-</span><span class="sfd">SFD</span>
    </div>
    <div class="line-reveal"></div>
    <div class="subtitle-line">Towards Narrative-Aware Recommendation</div>
    <div class="subtitle-line small">A Multimodal Dataset for Short-Form Dramas</div>
    <div class="conference-badge">ACM MULTIMEDIA 2026</div>
  </div>

  <!-- Click prompt -->
  <div class="please-click">
    <span>Click to enter</span>
    <div class="arrow-down">&#x25BE;</div>
  </div>

  <script>
    // ── Slow vertical background scroll ──
    gsap.to('.bg-scroll', {
      y: '-60vh',
      duration: 30,
      ease: 'none',
      repeat: -1,
      yoyo: true
    });

    // ── Cinematic entrance sequence ──

    // 1. Title letters rise in with blur
    gsap.to('.logo .mm', {
      opacity: 1, y: 0, duration: 1.4, delay: 0.6,
      ease: "power3.out",
      startAt: { y: 60, opacity: 0 }
    });
    gsap.to('.logo .dash', {
      opacity: 1, scaleX: 1, duration: 0.6, delay: 1.2,
      ease: "power2.out",
      startAt: { scaleX: 0, opacity: 0 }
    });
    gsap.to('.logo .sfd', {
      opacity: 1, y: 0, duration: 1.4, delay: 0.9,
      ease: "power3.out",
      startAt: { y: -60, opacity: 0 }
    });

    // 2. Decorative line wipes open
    gsap.to('.line-reveal', {
      width: '28vw', duration: 1.2, delay: 2.0,
      ease: "power2.inOut"
    });

    // 3. Subtitles fade in softly
    gsap.to('.subtitle-line', {
      opacity: 1, y: 0, duration: 1.0, delay: 2.4,
      stagger: 0.3, ease: "power2.out",
      startAt: { y: 20 }
    });

    // 4. Badge
    gsap.to('.conference-badge', {
      opacity: 1, duration: 0.8, delay: 3.2,
      ease: "power2.out"
    });

    // 5. Click prompt breathes in
    gsap.to('.please-click', {
      opacity: 1, duration: 1.2, delay: 3.8,
      ease: "power1.inOut"
    });
  </script>

</body>
</html>
